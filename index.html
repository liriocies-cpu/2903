<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Te amo hás</title>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  overflow: hidden;
  font-family: Arial;
}

#tab0 {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.tab {
  position: absolute;
  height: 100%;
  width: 80px;
  cursor: pointer;
  transition: 0.5s;
  box-shadow: 6px 0 10px rgba(0,0,0,0.3);
  overflow: visible;
}

.tab:nth-of-type(2) { left: 0; background:#2A0F24; z-index:5; }
.tab:nth-of-type(3) { left: 60px; background:#4A1F3A; z-index:4; }
.tab:nth-of-type(4) { left: 120px; background:#7A3A5A; z-index:3; }
.tab:nth-of-type(5) { left: 180px; background:#B75C82; z-index:2; }
.tab:nth-of-type(6) { left: 240px; background:#E899B3; z-index:1; }

.tab::after {
  content:'';
  position:absolute;
  width:50px;
  height:120px;
  right:-35px;
  top:30%;
  border-radius:0 20px 20px 0;
  background:inherit;
  box-shadow: 4px 0 8px rgba(0,0,0,0.2);
}

.content {
  position:absolute;
  top:0;
  left:80px;
  width:100vw;
  height:100vh;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.5s;
}

.tab.active {
  width:100vw;
  z-index:10;
}

.tab.active .content {
  opacity:1;
  pointer-events:auto;
}

.content img {
  width:90%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div id="tab0"></div>

<div class="tab" onclick="openTab(this)">
  <div class="content">
    <img src="https://i.postimg.cc/fL1bm5ZD/portada.png">
  </div>
</div>

<div class="tab" onclick="openTab(this)">
  <div class="content">
    <img src="https://i.postimg.cc/vBCmfXMQ/paisaje.png">
  </div>
</div>

<div class="tab" onclick="openTab(this)">
  <div class="content">
    <img src="https://i.postimg.cc/zByBy4mB/mazo.png">
  </div>
</div>

<div class="tab" onclick="openTab(this)">
  <div class="content">
    <img src="https://i.postimg.cc/cHPJwTZZ/songs.png">
  </div>
</div>

<div class="tab" onclick="openTab(this)">
  <div class="content">
    <img src="https://i.postimg.cc/C19KkJYg/carta.png">
  </div>
</div>

<script>
function openTab(tab) {
  if (tab.classList.contains("active")) {
    tab.classList.remove("active");
  } else {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
  }
}

document.getElementById("tab0").onclick = () => {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
};
</script>

</body>
  </html>
